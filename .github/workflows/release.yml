name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install --upgrade pip 'poetry>=1.8,<2'

      - name: Configure Poetry (in-project venv)
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install 'pyinstaller==6.11.1'

      - name: Build EXE (directory mode)
        run: poetry run pyinstaller --name GLAURLex --collect-all streamlit --collect-all numpy --add-data "src/glaurlex/ui;glaurlex/ui" scripts/run_glaurlex.py

      - name: Smoke test built EXE
        run: |
          ./dist/GLAURLex/GLAURLex.exe &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8501/_stcore/health >/dev/null 2>&1; then
              echo "Smoke test passed"
              taskkill //F //IM GLAURLex.exe >/dev/null 2>&1 || true
              exit 0
            fi
            sleep 2
          done
          taskkill //F //IM GLAURLex.exe >/dev/null 2>&1 || true
          echo "Smoke test failed: server did not respond on :8501"
          exit 1

      - name: Zip dist directory
        run: cd dist && 7z a GLAURLex-windows.zip GLAURLex/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: glaurlex-windows-exe
          path: dist/GLAURLex-windows.zip

  build-macos-app:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install --upgrade pip 'poetry>=1.8,<2'

      - name: Configure Poetry (in-project venv)
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install 'pyinstaller==6.11.1'

      - name: Build app (directory mode)
        run: poetry run pyinstaller --name GLAURLex --collect-all streamlit --collect-all numpy --add-data "src/glaurlex/ui:glaurlex/ui" scripts/run_glaurlex.py

      - name: Smoke test built app
        run: |
          ./dist/GLAURLex/GLAURLex &
          PID=$!
          trap "kill $PID 2>/dev/null || true" EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8501/_stcore/health >/dev/null 2>&1; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Smoke test failed: server did not respond on :8501"
          exit 1

      - name: Zip dist directory
        run: cd dist && zip -r GLAURLex-macos.zip GLAURLex/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: glaurlex-macos-app
          path: dist/GLAURLex-macos.zip

  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Prepare Doxygen output dir
        run: mkdir -p build/doxygen

      - name: Generate Doxygen docs (core)
        run: doxygen Doxyfile

      - name: Zip docs
        run: |
          cd build/doxygen
          zip -r doxygen-html.zip html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/doxygen/doxygen-html.zip

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-windows-exe, build-macos-app, build-docs]
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Generate SHA256SUMS
        run: |
          sha256sum \
            glaurlex-windows-exe/GLAURLex-windows.zip \
            glaurlex-macos-app/GLAURLex-macos.zip \
            doxygen-html/doxygen-html.zip \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            glaurlex-windows-exe/GLAURLex-windows.zip
            glaurlex-macos-app/GLAURLex-macos.zip
            doxygen-html/doxygen-html.zip
            SHA256SUMS
