name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Configure Poetry (in-project venv)
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build EXE (directory mode)
        run: poetry run pyinstaller --name GLAURLex --collect-all streamlit --add-data "src/glaurlex/ui;glaurlex/ui" scripts/run_glaurlex.py

      - name: Zip dist directory
        run: cd dist && 7z a GLAURLex-windows.zip GLAURLex/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: glaurlex-windows-exe
          path: dist/GLAURLex-windows.zip

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Prepare Doxygen output dir
        run: mkdir -p build/doxygen

      - name: Generate Doxygen docs (core)
        run: doxygen Doxyfile

      - name: Zip docs
        run: |
          cd build/doxygen
          zip -r doxygen-html.zip html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/doxygen/doxygen-html.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows-exe, build-docs]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            glaurlex-windows-exe/GLAURLex-windows.zip
            doxygen-html/doxygen-html.zip
