http:
  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/verify?rd=https%3A%2F%2Fauth.glaurlex.localhost%2F"
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email
