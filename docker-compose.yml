# GLAURLex stack: Traefik (reverse proxy + ACME) + Authelia (auth) + app.
#
# Configura `.env` antes de levantar (ver `.env.example`). Todo lo editable
# (imágenes, hosts, puertos, rutas) vive en `.env`.
#
# Primera vez en el servidor:
#   1. cp .env.example .env  &&  editar valores
#   2. touch ${ACME_STORAGE_FILE} && chmod 600 ${ACME_STORAGE_FILE}
#   3. mkdir -p ${AUTHELIA_DATA_DIR} ${HOST_DATA_DIR}
#   4. editar deploy/authelia/users_database.yml (hashear contraseñas)
#   5. docker compose up -d
#
# Los datos de cada usuario viven en ${HOST_DATA_DIR}/<username>/processed
# y se montan en /data dentro del contenedor de la app. El contenedor corre
# con PUID/PGID no-root (por defecto 1000:1000).

services:
  traefik:
    image: ${TRAEFIK_IMAGE}
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    environment:
      # Consumidas por las plantillas de traefik.yml y deploy/traefik/dynamic/*.
      - APP_HOST=${APP_HOST}
      - AUTH_HOST=${AUTH_HOST}
      - DASHBOARD_HOST=${DASHBOARD_HOST}
      - APP_PORT=${APP_PORT}
      - AUTH_PORT=${AUTH_PORT}
      - ACME_EMAIL=${ACME_EMAIL}
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}

    volumes:
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
      - ${ACME_STORAGE_FILE}:/letsencrypt/acme.json
    networks:
      - proxy
    depends_on:
      - authelia
      - glaurlex

  authelia:
    image: ${AUTHELIA_IMAGE}
    restart: unless-stopped
    expose:
      - "${AUTH_PORT}"
    environment:
      - X_AUTHELIA_CONFIG_FILTERS=template
      - AUTH_HOST=${AUTH_HOST}
      - APP_HOST=${APP_HOST}
      - DASHBOARD_HOST=${DASHBOARD_HOST}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - TZ=${TZ:-UTC}
      - AUTHELIA_JWT_SECRET_FILE=/secrets/jwt_secret
      - AUTHELIA_SESSION_SECRET_FILE=/secrets/session_secret
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/secrets/storage_encryption_key
    volumes:
      - ./deploy/authelia:/config
      - ./deploy/authelia/secrets:/secrets
      - ${AUTHELIA_DATA_DIR}:/data
    networks:
      - proxy

  glaurlex:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: ${GLAURLEX_IMAGE}
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    expose:
      - "${APP_PORT}"
    environment:
      - GLAURLEX_DATA_DIR=/data
      - GLAURLEX_REMOTE_USER_HEADER=${GLAURLEX_REMOTE_USER_HEADER}
      - GLAURLEX_REQUIRE_AUTH=${GLAURLEX_REQUIRE_AUTH}
      - GLAURLEX_LOGOUT_URL=https://${AUTH_HOST}/logout
      - STREAMLIT_SERVER_PORT=${APP_PORT}
      - APP_ENV=${APP_ENV}
    volumes:
      # Raíz por-usuario en el host. Cada subcarpeta es <username>/processed.
      - ${HOST_DATA_DIR}:/data
    networks:
      - proxy
    depends_on:
      - authelia

networks:
  proxy:
    name: glaurlex_proxy
